juju:
  model-defaults:
    logging-config: <root>=INFO; unit=DEBUG
providers:
  k8s:
    enable: true
    bootstrap: true
    features:
      load-balancer:
        l2-mode: true
        cidrs: 10.64.140.43/32
    bootstrap-constraints:
      root-disk: 5G
host:
  snaps:
    jhack:
      channel: latest/edge
      connections:
        - jhack:dot-local-share-juju snapd
